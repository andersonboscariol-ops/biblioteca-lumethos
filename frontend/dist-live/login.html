<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b2242">
<title>Biblioteca Lumethos — Login</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  height: 100%;
  background: #f5f5f5;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}

/* ===== CARD CONTAINER ===== */
.login-card {
  display: flex;
  width: 1100px;
  max-width: 100%;
  height: 560px;
  max-height: calc(100vh - 48px);
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow:
    0 2px 8px rgba(0,0,0,.04),
    0 16px 48px rgba(11,34,66,.12),
    0 32px 64px rgba(0,0,0,.08);
}

/* ===== LEFT COLUMN — GRADIENT (50%) ===== */
.login-left {
  flex: 0 0 50%;
  background: linear-gradient(180deg, #0f2d54 0%, #0b2242 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 36px;
  text-align: center;
  position: relative;
}
.login-left::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(ellipse at 20% 80%, rgba(255,255,255,.03) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(255,255,255,.02) 0%, transparent 50%);
  pointer-events: none;
}
.login-badge {
  display: inline-block;
  background: #c89b2b;
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 8px 20px;
  border-radius: 999px;
  margin-bottom: 28px;
  position: relative;
}
.login-logo {
  width: 100%;
  max-width: 225px;
  margin-bottom: 24px;
  position: relative;
}
.login-logo img {
  width: 100%;
  height: auto;
  display: block;
}
.login-left h1 {
  font-family: Georgia, 'Times New Roman', Times, serif;
  font-size: 42px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
  position: relative;
}
.login-desc {
  font-size: 18px;
  color: rgba(255,255,255,.72);
  line-height: 1.7;
  max-width: 360px;
  position: relative;
}

/* ===== RIGHT COLUMN — WHITE (50%) ===== */
.login-right {
  flex: 0 0 50%;
  background: #fff;
  padding: 56px 56px 48px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.login-right h2 {
  font-family: Georgia, 'Times New Roman', Times, serif;
  font-size: 24px;
  font-weight: 700;
  color: #1d1d1d;
  letter-spacing: -0.3px;
  line-height: 1.15;
  margin-bottom: 8px;
  text-align: center;
  max-width: 400px;
  width: 100%;
}
.login-subtitle {
  font-size: 14px;
  color: #7c7c7c;
  margin-bottom: 28px;
  text-align: center;
  max-width: 400px;
  width: 100%;
}
.login-msg {
  text-align: center;
  font-size: 14px;
  min-height: 20px;
  margin-top: 8px;
  color: #e74c3c;
  max-width: 400px;
  width: 100%;
}
.login-msg.success {
  color: #27ae60;
}

/* ===== FORM ===== */
.login-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 400px;
  width: 100%;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-group label {
  font-size: 14px;
  font-weight: 600;
  color: #333;
  letter-spacing: 0.3px;
}
.form-group input[type="email"],
.form-group input[type="password"],
.form-group input[type="text"] {
  height: 64px;
  background: #eef2fa;
  border: 1px solid #dfe5ef;
  border-radius: 12px;
  padding-left: 20px;
  font-size: 18px;
  color: #1d1d1d;
  outline: none;
  transition: border-color .25s ease, box-shadow .25s ease;
  width: 100%;
}
.form-group input::placeholder { color: #9ca3b5; font-size: 18px; }
.form-group input:focus {
  border-color: #c89b2b;
  box-shadow: 0 0 0 3px rgba(200,155,43,.15);
}
.form-group input.error {
  border-color: #e74c3c;
  box-shadow: 0 0 0 3px rgba(231,76,60,.12);
}

/* ===== OPTIONS ROW ===== */
.login-options {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 4px 0 0;
}
.login-remember {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: #555;
  cursor: pointer;
}
.login-remember input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #c89b2b;
  cursor: pointer;
}
.login-forgot {
  font-size: 14px;
  color: #c89b2b !important;
  text-decoration: none;
  font-weight: 600;
  cursor: pointer;
  background: none;
  border: none;
  transition: opacity .2s;
}
.login-forgot:hover { opacity: .8; }

/* ===== SUBMIT BUTTON ===== */
.login-btn {
  height: 64px;
  width: 100%;
  background: #c89b2b;
  color: #111111;
  font-size: 22px;
  font-weight: 700;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: background .25s ease, transform .15s ease, box-shadow .25s ease;
  letter-spacing: 0.5px;
  margin-top: 4px;
}
.login-btn:hover { background: #b78918; }
.login-btn:active { transform: scale(.98); }
.login-btn.is-loading {
  opacity: .8;
  position: relative;
  pointer-events: none;
}
.login-btn.is-loading::after {
  content: '';
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  border: 2px solid rgba(17,17,17,.3);
  border-top-color: #111;
  border-radius: 50%;
  animation: fm-spin .8s linear infinite;
}
@keyframes fm-spin {
  from { transform: translateY(-50%) rotate(0deg); }
  to   { transform: translateY(-50%) rotate(360deg); }
}

/* ===== FOOTER ===== */
.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 14px;
  color: #7c7c7c;
  max-width: 400px;
  width: 100%;
}
.login-footer a {
  color: #c89b2b;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  transition: opacity .2s;
}
.login-footer a:hover { opacity: .8; }

/* ===== RESPONSIVE ===== */
@media (max-width: 767px) {
  body { padding: 0; }
  .login-card {
    flex-direction: column;
    height: auto;
    min-height: 100vh;
    border-radius: 0;
    box-shadow: none;
  }
  .login-left {
    flex: none;
    padding: 36px 24px 28px;
  }
  .login-left h1 { font-size: 28px; }
  .login-desc { font-size: 15px; max-width: 100%; }
  .login-logo { max-width: 140px; }
  .login-badge { font-size: 10px; padding: 6px 14px; margin-bottom: 20px; }
  .login-right {
    flex: none;
    padding: 32px 24px;
  }
  .login-right h2 { font-size: 20px; }
  .form-group input[type="email"],
  .form-group input[type="password"],
  .form-group input[type="text"] { height: 56px; font-size: 16px; }
  .login-btn { height: 56px; font-size: 18px; }
}

/* ===== REGISTER MODE (hidden by default) ===== */
#register-section { display: none; }
</style>
</head>
<body>

<div class="login-card">
  <!-- LEFT COLUMN — Gradiente azul escuro -->
  <div class="login-left">
    <span class="login-badge">BIBLIOTECA LUMETHOS</span>
    <div class="login-logo">
      <img src="/logo-biblioteca.png" alt="Biblioteca Lumethos">
    </div>
    <h1>Biblioteca<br>Lumethos</h1>
    <p class="login-desc">Acesse centenas de livros teológicos, apostilas e materiais de estudo.</p>
  </div>

  <!-- RIGHT COLUMN — Formulários -->
  <div class="login-right">

    <!-- ===== LOGIN ===== -->
    <div id="login-section">
      <h2>Bem-vindo de volta</h2>
      <p class="login-subtitle">Faça login para acessar sua conta</p>

      <form class="login-form" id="loginForm" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="loginEmail">E-mail</label>
          <input type="email" id="loginEmail" placeholder="Digite seu e-mail" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="loginPassword">Senha</label>
          <input type="password" id="loginPassword" placeholder="Digite sua senha" required autocomplete="current-password">
        </div>
        <div class="login-options">
          <label class="login-remember">
            <input type="checkbox" id="rememberMe" checked>
            Lembrar-me
          </label>
          <button type="button" class="login-forgot" disabled style="opacity:.4;cursor:default">Esqueci a senha</button>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Entrar</button>
      </form>

      <div class="login-msg" id="loginMsg"></div>

      <div class="login-footer">
        Ainda não tem conta? <a href="#" id="showRegisterLink">Cadastre-se</a>
      </div>
    </div>

    <!-- ===== REGISTER (hidden) ===== -->
    <div id="register-section">
      <h2>Criar sua conta</h2>
      <p class="login-subtitle">Cadastre-se e escolha seu plano de acesso</p>

      <form class="login-form" id="registerForm" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="regName">Nome completo</label>
          <input type="text" id="regName" placeholder="Seu nome completo" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="regEmail">E-mail</label>
          <input type="email" id="regEmail" placeholder="Seu melhor e-mail" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="regPassword">Senha</label>
          <input type="password" id="regPassword" placeholder="Crie uma senha (mín. 6 caracteres)" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="login-btn" id="registerBtn">Criar Conta</button>
      </form>

      <div class="login-msg" id="registerMsg"></div>

      <div class="login-footer">
        Já tem conta? <a href="#" id="showLoginLink">Fazer login</a>
      </div>
    </div>

  </div>
</div>

<script>
(function() {
  const API = window.location.origin;

  // DOM refs
  const loginSection = document.getElementById('login-section');
  const registerSection = document.getElementById('register-section');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const loginMsg = document.getElementById('loginMsg');
  const registerMsg = document.getElementById('registerMsg');
  const loginBtn = document.getElementById('loginBtn');
  const registerBtn = document.getElementById('registerBtn');

  document.getElementById('showRegisterLink').addEventListener('click', function(e) {
    e.preventDefault();
    loginSection.style.display = 'none';
    registerSection.style.display = 'block';
    loginMsg.textContent = '';
  });

  document.getElementById('showLoginLink').addEventListener('click', function(e) {
    e.preventDefault();
    loginSection.style.display = 'block';
    registerSection.style.display = 'none';
    registerMsg.textContent = '';
  });

  // === LOGIN ===
  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();
    loginMsg.textContent = '';
    loginBtn.classList.add('is-loading');
    loginBtn.textContent = 'Entrando...';

    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    })
    .then(function(r) { return r.json().then(function(d) { return { status: r.status, data: d }; }); })
    .then(function(res) {
      if (res.status !== 200 && res.status !== 201) {
        throw new Error(res.data.error || 'Email ou senha inválidos');
      }
      localStorage.setItem('biblioteca_token', res.data.token);
      // Redirect to biblioteca app
      window.location.href = '/';
    })
    .catch(function(err) {
      loginMsg.textContent = err.message;
      loginMsg.className = 'login-msg';
      loginBtn.classList.remove('is-loading');
      loginBtn.textContent = 'Entrar';
    });
  });

  // === REGISTER ===
  registerForm.addEventListener('submit', function(e) {
    e.preventDefault();
    registerMsg.textContent = '';
    registerBtn.classList.add('is-loading');
    registerBtn.textContent = 'Criando...';

    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;

    fetch(API + '/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    })
    .then(function(r) { return r.json().then(function(d) { return { status: r.status, data: d }; }); })
    .then(function(res) {
      if (res.status !== 200 && res.status !== 201) {
        throw new Error(res.data.error || 'Erro ao criar conta');
      }
      localStorage.setItem('biblioteca_token', res.data.token);
      registerMsg.textContent = '✅ Conta criada! Redirecionando...';
      registerMsg.className = 'login-msg success';
      // Redirect to biblioteca app → will trigger subscription flow
      window.location.href = '/';
    })
    .catch(function(err) {
      registerMsg.textContent = err.message;
      registerMsg.className = 'login-msg';
      registerBtn.classList.remove('is-loading');
      registerBtn.textContent = 'Criar Conta';
    });
  });

  // Check if already logged in — redirect to app
  var existingToken = localStorage.getItem('biblioteca_token');
  if (existingToken) {
    // Quick validation
    fetch(API + '/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + existingToken }
    })
    .then(function(r) {
      if (r.ok) { window.location.href = '/'; }
    })
    .catch(function() { /* ignore, stay on login */ });
  }
})();
</script>
</body>
</html>
